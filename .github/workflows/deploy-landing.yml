name: Deploy landing (Cloudflare Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Must match (or be replaced alongside) the Pages project name in landing/README.md
          command: pages deploy landing --project-name=safephone-focus-landing
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
