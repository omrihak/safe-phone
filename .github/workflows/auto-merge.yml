# Merges any pull request after "Android CI" succeeds for the same commit as the PR head
# (head SHA must match the workflow run; avoids merging if the branch moved after CI).
# Branch protection: if merges are blocked (required reviewers), add repository secret
# COPILOT_MERGE_PAT — a fine-grained PAT with Contents and Pull requests (write), or
# classic PAT with repo scope — and relax or bypass rules as appropriate for your org.

name: Auto-merge on CI pass

on:
  workflow_run:
    workflows: ["Android CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge-pr:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_MERGE_PAT != '' && secrets.COPILOT_MERGE_PAT || github.token }}
          script: |
            const run = context.payload.workflow_run;
            if (run.event !== 'pull_request') {
              core.info('CI was not triggered by a pull_request; skipping.');
              return;
            }
            const headFull = run.head_repository?.full_name;
            const repoFull = run.repository?.full_name;
            if (!headFull || headFull !== repoFull) {
              core.info('Fork or missing head repo; skipping auto-merge.');
              return;
            }
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumbers = (run.pull_requests || []).map((p) => p.number);
            if (prNumbers.length === 0) {
              const { data: openPrs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                per_page: 100,
              });
              prNumbers = openPrs.filter((p) => p.head.sha === run.head_sha).map((p) => p.number);
            }
            const defaultBranch =
              context.payload.repository?.default_branch || 'main';
            const mergeableBases = new Set([defaultBranch, 'main', 'master']);
            for (const num of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: num,
              });
              if (pr.state !== 'open' || pr.merged) {
                continue;
              }
              if (pr.head.sha !== run.head_sha) {
                core.info(
                  `PR #${num} head ${pr.head.sha.slice(0, 7)} does not match Android CI run ${String(run.head_sha).slice(0, 7)}; branch moved or run is stale — skipping merge.`,
                );
                continue;
              }
              if (!mergeableBases.has(pr.base.ref)) {
                core.info(`PR #${num} targets ${pr.base.ref}; skipping.`);
                continue;
              }
              if (pr.draft) {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: num,
                  draft: false,
                });
                core.info(`PR #${num} was a draft; marked ready for review before merge.`);
              }
              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: num,
                  merge_method: 'squash',
                });
                core.info(`Merged PR #${num} into ${pr.base.ref}.`);
              } catch (e) {
                core.warning(`Could not merge PR #${num}: ${e.message}`);
              }
            }
