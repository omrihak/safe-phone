name: Vibe coding feature
description: Request a SafePhone change from the web; pairs with the in-app “Vibe coding” card when labels match.
title: "[Vibe] "
labels:
  - vibe-coding
body:
  - type: markdown
    attributes:
      value: |
        After you submit, **Vibe coding — OTA hints** (GitHub Action) will comment with the internal APK / OTA steps.

        **Copilot coding agent** is assigned automatically when the repository secret `COPILOT_ASSIGN_PAT` is configured (details in **docs/internal-auto-update.md** on the default branch, section *Automatic Copilot assignment*). Add the label **`no-copilot`** to skip auto-assignment.

        Otherwise implement locally and merge to **the git branch your internal build tracks** (same ref as `safephone.internalUpdateTrackRef`).
  - type: textarea
    id: description
    attributes:
      label: What should change?
      description: Screens, behavior, edge cases, and acceptance checks.
    validations:
      required: true
